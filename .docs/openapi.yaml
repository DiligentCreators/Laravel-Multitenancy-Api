openapi: 3.0.3
info:
  title: FollowKa Central Admin API
  version: 1.0.0
  description: Central administration API for the FollowKa multi-tenant platform

servers:
  - url: https://followka.test/api/central/v1
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        last_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        next_page_url: { type: string, nullable: true }
        prev_page_url: { type: string, nullable: true }

    SuccessResponse:
      type: object
      properties:
        status: { type: string, example: success }
        message: { type: string }
        data: { type: object }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    ErrorResponse:
      type: object
      properties:
        status: { type: string, example: error }
        message: { type: string }
        errors: { type: object }

    # Auth
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    LoginResponse:
      type: object
      properties:
        status: { type: string }
        message: { type: string }
        data:
          type: object
          properties:
            user: { type: object }
            token: { type: string }

    # Setting Group
    SettingGroup:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        sort_order: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # System Setting
    SystemSetting:
      type: object
      properties:
        id: { type: integer }
        group_id: { type: integer }
        key: { type: string }
        label: { type: string }
        value: { type: string, nullable: true }
        type: { type: string, enum: [text, textarea, number, boolean, select, json, email, url, file, password] }
        is_public: { type: boolean }
        is_encrypted: { type: boolean }
        sort_order: { type: integer }

    # Email Template
    EmailTemplate:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        subject: { type: string }
        body: { type: string }
        variables: { type: array, items: { type: string } }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    # SMS Template
    SmsTemplate:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        message: { type: string }
        variables: { type: array, items: { type: string } }
        is_active: { type: boolean }

    # Notification Template
    NotificationTemplate:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        channel: { type: string, enum: [email, sms, push, in_app] }
        title: { type: string }
        message: { type: string }
        variables: { type: array, items: { type: string } }
        is_active: { type: boolean }

    # Usage Counter
    UsageCounter:
      type: object
      properties:
        tenant_id: { type: string }
        feature: { type: string }
        used: { type: integer }
        limit: { type: integer }
        remaining: { type: integer }
        allowed: { type: boolean }

    # Overage Charge
    OverageCharge:
      type: object
      properties:
        id: { type: integer }
        tenant_id: { type: string }
        feature: { type: string }
        quantity: { type: integer }
        unit_price: { type: number, format: float }
        amount: { type: number, format: float }
        status: { type: string, enum: [pending, invoiced, paid, waived] }

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Get admin dashboard
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    properties:
                      tenants: { type: object }
                      users: { type: object }
                      plans: { type: object }
                      subscriptions: { type: object }
                      revenue:
                        type: object
                        properties:
                          mrr: { type: number }
                          arr: { type: number }
                          average_revenue_per_tenant: { type: number }
                      churn:
                        type: object
                        properties:
                          monthly_churn: { type: number }
                          quarterly_churn: { type: number }

  # Settings Groups
  /settings-groups:
    get:
      tags: [Settings Groups]
      summary: List setting groups
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Setting groups list
    post:
      tags: [Settings Groups]
      summary: Create setting group
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }

  '/settings-groups/{id}':
    get:
      tags: [Settings Groups]
      summary: Show setting group
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Setting group details }
    put:
      tags: [Settings Groups]
      summary: Update setting group
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }
    delete:
      tags: [Settings Groups]
      summary: Delete setting group
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }

  # System Settings
  /system-settings:
    get:
      tags: [System Settings]
      summary: List system settings
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: System settings list }
    post:
      tags: [System Settings]
      summary: Create system setting
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }

  '/system-settings/{id}':
    get:
      tags: [System Settings]
      summary: Show system setting
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Setting details }
    put:
      tags: [System Settings]
      summary: Update system setting
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }
    delete:
      tags: [System Settings]
      summary: Delete system setting
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }

  # Email Templates
  /email-templates:
    get:
      tags: [Email Templates]
      summary: List email templates
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Email templates list }
    post:
      tags: [Email Templates]
      summary: Create email template
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }

  '/email-templates/{id}':
    get:
      tags: [Email Templates]
      summary: Show email template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Template details }
    put:
      tags: [Email Templates]
      summary: Update email template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }
    delete:
      tags: [Email Templates]
      summary: Delete email template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }

  '/email-templates/{id}/preview':
    post:
      tags: [Email Templates]
      summary: Preview email template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Preview rendered }

  '/email-templates/{id}/duplicate':
    post:
      tags: [Email Templates]
      summary: Duplicate email template
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Duplicated }

  '/email-templates/{id}/versions':
    get:
      tags: [Email Templates]
      summary: Get template version history
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Version list }

  # SMS Templates
  /sms-templates:
    get:
      tags: [SMS Templates]
      summary: List SMS templates
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: SMS templates list }
    post:
      tags: [SMS Templates]
      summary: Create SMS template
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }

  '/sms-templates/{id}':
    get:
      tags: [SMS Templates]
      summary: Show SMS template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Template details }
    put:
      tags: [SMS Templates]
      summary: Update SMS template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }
    delete:
      tags: [SMS Templates]
      summary: Delete SMS template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }

  # Notification Templates
  /notification-templates:
    get:
      tags: [Notification Templates]
      summary: List notification templates
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Templates list }
    post:
      tags: [Notification Templates]
      summary: Create notification template
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }

  '/notification-templates/{id}':
    get:
      tags: [Notification Templates]
      summary: Show notification template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Template details }
    put:
      tags: [Notification Templates]
      summary: Update notification template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }
    delete:
      tags: [Notification Templates]
      summary: Delete notification template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deleted }

  # Usage Tracking
  '/tenants/{tenantId}/usage/{feature}':
    get:
      tags: [Usage Tracking]
      summary: Get tenant usage
      security: [{ bearerAuth: [] }]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema: { type: string }
        - name: feature
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Usage data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsageCounter' }
    post:
      tags: [Usage Tracking]
      summary: Reset usage counter
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Counter reset }

  # Overage Charges
  /overage-charges:
    get:
      tags: [Overage Charges]
      summary: List overage charges
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Overage charges list }

  '/overage-charges/{id}':
    get:
      tags: [Overage Charges]
      summary: Show overage charge
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Charge details }
    put:
      tags: [Overage Charges]
      summary: Update charge status
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Status updated }
