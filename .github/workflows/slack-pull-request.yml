name: Notify Slack on Pull Request

on:
  pull_request:
    types: [opened, reopened]

jobs:
  slackNotify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ":bell: *New Pull Request Opened*\n\n>*Title:* ${{ github.event.pull_request.title }}\n>*Author:* ${{ github.event.pull_request.user.login }}\n>*Branch:* `${{ github.head_ref }}`\n>*Link:* ${{ github.event.pull_request.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
